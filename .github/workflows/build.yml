name: Build
on:
  pull_request:
    branches:
      - master

jobs:
  Build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud Hooks
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Force dalamud.zip "$env:AppData\XIVLauncherCN\addon\Hooks\dev"

      - name: Restore
        run: dotnet restore MCPforDalamud/MCPforDalamud.csproj

      - name: Build
        run: dotnet build --no-restore -c Release MCPforDalamud/MCPforDalamud.csproj
